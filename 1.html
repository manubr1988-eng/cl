<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave Application</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e0e0e0;
}

.master-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
}

.printable-sheet{
  width:100%;
  max-width:800px;
  background:#fff;
  padding:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* TABLE */
.form-table{
  width:100%;
  border-collapse:collapse;
}

.form-table tr{
  border-bottom:1px solid #ccc;
}

.label-cell{
  width:40%;
  background:#f2f7ff;
  padding:10px;
  font-weight:bold;
}

.input-cell{
  width:60%;
  padding:5px 10px;
}

input,select{
  width:100%;
  border:none;
  outline:none;
  font-size:15px;
  background:transparent;
}

/* TITLE */
.title-banner{
  background:#333;
  color:#fff;
  text-align:center;
  padding:10px;
  margin:20px 0;
  font-weight:bold;
}

.title-banner input{
  transform:scale(1.3);
  margin-right:5px;
}

/* BUTTON */
.btn{
  background:#d32f2f;
  color:#fff;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:10px 5px;
}

/* DATE */
.date-row{
  display:flex;
  gap:10px;
}

.date-row input{
  border-bottom:1px solid #000;
}

/* PRINT */
@media print{
  @page{ size:A4; margin:10mm; }

  body *{visibility:hidden;}

  .printable-sheet,.printable-sheet *{
    visibility:visible;
  }

  .printable-sheet{
    position:absolute;
    top:0;
    left:0;
    width:210mm;
  }

  .no-print{display:none;}
}
</style>
</head>

<body>

<div class="master-container">

<div class="printable-sheet">

<div style="font-weight:bold;">
ರಿಗೆ,<br>
ಮಾನ್ಯ ಮುಖ್ಯೋಪಾಧ್ಯಾಯರು<br>
ಸರ್ಕಾರಿ ಶಾಲೆ:
<input placeholder="ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ" style="border-bottom:1px solid #000;">
</div>

<!-- RADIO -->
<div class="title-banner">

<label id="opt1">
<input type="radio" name="leaveType" onclick="selectType('casual')">
ಸಾಂದರ್ಭಿಕ ರಜೆ
</label>

&nbsp;&nbsp;

<label id="opt2">
<input type="radio" name="leaveType" onclick="selectType('restricted')">
ನಿರ್ಬಂಧಿತ ರಜೆ
</label>

<br><br>
<b>ಅರ್ಜಿ</b>

</div>

<table class="form-table">

<tr>
<td class="label-cell">1. ಅರ್ಜಿದಾರರ ಹೆಸರು</td>
<td class="input-cell"><input placeholder="ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ"></td>
</tr>

<tr>
<td class="label-cell">2. ಪದನಾಮ</td>
<td class="input-cell">
<select>
<option>ಆಯ್ಕೆ ಮಾಡಿ</option>
<option>ಮುಖ್ಯ ಶಿಕ್ಷಕರು</option>
<option>ಸಹ ಶಿಕ್ಷಕರು</option>
</select>
</td>
</tr>

<tr>
<td class="label-cell">3. ಕಾರ್ಯಾಲಯದ ಹೆಸರು</td>
<td class="input-cell"><input placeholder="ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ"></td>
</tr>

<tr>
<td class="label-cell">4. ರಜೆ ದಿನಗಳು</td>
<td class="input-cell"><input placeholder="ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ"></td>
</tr>

<tr>
<td class="label-cell">5. ರಜೆ ದಿನಾಂಕ</td>
<td class="input-cell">
<div class="date-row">
<input type="date">
<span>ರಿಂದ</span>
<input type="date">
<span>ವರೆಗೆ</span>
</div>
</td>
</tr>

<tr>
<td class="label-cell">6. ಕಾರಣ</td>
<td class="input-cell"><input placeholder="ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ"></td>
</tr>

</table>

<p style="text-align:center; margin:20px;">
ರಜೆ ಮಂಜೂರು ಮಾಡುವಂತೆ ವಿನಂತಿ.
</p>

<!-- PRINT -->
<div style="text-align:center;">
<button class="btn no-print" onclick="window.print()">🖨 PRINT</button>
</div>

</div>
</div>

<script>
// RADIO HIDE
function selectType(type){
  if(type==='casual'){
    document.getElementById("opt2").style.display="none";
  }else{
    document.getElementById("opt1").style.display="none";
  }
}
</script>

</body>
</html>
